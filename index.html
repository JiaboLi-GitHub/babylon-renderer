<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babylon.js Scene + ViewCube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    body { position: relative; }
    #mainCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #cubeViewWrapper {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }
    #langBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 6px 14px;
      background: rgba(40, 40, 40, 0.8);
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #langBtn:hover { background: rgba(60, 60, 60, 0.9); }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>
  <button id="langBtn">中文</button>
  <div id="cubeViewWrapper">
    <canvas id="cubeViewCanvas" width="150" height="150"></canvas>
  </div>

  <script type="module">
    import {
      Engine, Scene, ArcRotateCamera, Camera, Vector3, HemisphericLight,
      Matrix, MeshBuilder, StandardMaterial, Color3, Color4, DynamicTexture,
    } from '@babylonjs/core';
    import { CubeView } from './src/index.ts';

    const gridConfig = {
      elevation: 0,
      coordinateScale: 25,
      halfRangeValue: 350,
      targetMajorPixelSpacing: 80,
      minorPerMajor: 2,
      minMajorValueStep: 25,
      maxMajorValueStep: 500,
    };

    // --- Main Scene ---
    const mainCanvas = document.getElementById('mainCanvas');
    const engine = new Engine(mainCanvas, true, { preserveDrawingBuffer: true });
    const scene = new Scene(engine);
    scene.clearColor = new Color4(1, 1, 1, 1);
    scene.useRightHandedSystem = true;

    function isMultipleOf(value, interval) {
      return Math.abs(value / interval - Math.round(value / interval)) < 1e-6;
    }

    const gridMeshes = {
      minor: null,
      major: null,
      border: null,
      xAxis: null,
      yAxis: null,
      signature: null,
    };

    function disposeMesh(mesh) {
      if (mesh) {
        mesh.dispose();
      }
    }

    function rebuildGridMeshes(scene, state, elevation) {
      disposeMesh(gridMeshes.minor);
      disposeMesh(gridMeshes.major);
      disposeMesh(gridMeshes.border);
      disposeMesh(gridMeshes.xAxis);
      disposeMesh(gridMeshes.yAxis);

      const halfWorld = state.halfRangeWorld;
      const minorLines = [];
      const majorLines = [];
      const axisHeight = elevation + 0.01;

      for (const value of getSteppedGridValues(state.halfRangeValue, state.minorValueStep)) {
        const snappedValue = Math.abs(value) < 1e-6 ? 0 : Number(value.toFixed(6));
        const worldValue = snappedValue / state.coordinateScale;
        const isMajor = isMultipleOf(snappedValue, state.majorValueStep);
        const target = isMajor ? majorLines : minorLines;

        target.push([
          new Vector3(-halfWorld, worldValue, elevation),
          new Vector3(halfWorld, worldValue, elevation),
        ]);
        target.push([
          new Vector3(worldValue, -halfWorld, elevation),
          new Vector3(worldValue, halfWorld, elevation),
        ]);
      }

      gridMeshes.minor = MeshBuilder.CreateLineSystem('minorGrid', {
        lines: minorLines,
        updatable: false,
      }, scene);
      gridMeshes.minor.color = new Color3(0.9, 0.9, 0.9);
      gridMeshes.minor.isPickable = false;

      gridMeshes.major = MeshBuilder.CreateLineSystem('majorGrid', {
        lines: majorLines,
        updatable: false,
      }, scene);
      gridMeshes.major.color = new Color3(0.75, 0.75, 0.75);
      gridMeshes.major.isPickable = false;

      gridMeshes.border = MeshBuilder.CreateLines('gridBorder', {
        points: [
          new Vector3(-halfWorld, -halfWorld, axisHeight),
          new Vector3(-halfWorld, halfWorld, axisHeight),
          new Vector3(halfWorld, halfWorld, axisHeight),
          new Vector3(halfWorld, -halfWorld, axisHeight),
          new Vector3(-halfWorld, -halfWorld, axisHeight),
        ],
      }, scene);
      gridMeshes.border.color = new Color3(0.6, 0.6, 0.6);
      gridMeshes.border.isPickable = false;

      gridMeshes.xAxis = MeshBuilder.CreateLines('gridXAxis', {
        points: [
          new Vector3(-halfWorld, 0, axisHeight),
          new Vector3(halfWorld, 0, axisHeight),
        ],
      }, scene);
      gridMeshes.xAxis.color = new Color3(0.74, 0.96, 0.74);
      gridMeshes.xAxis.isPickable = false;

      gridMeshes.yAxis = MeshBuilder.CreateLines('gridYAxis', {
        points: [
          new Vector3(0, -halfWorld, axisHeight),
          new Vector3(0, halfWorld, axisHeight),
        ],
      }, scene);
      gridMeshes.yAxis.color = new Color3(1, 0.58, 0.58);
      gridMeshes.yAxis.isPickable = false;
    }

    function syncGridMeshes(scene, state, elevation) {
      const signature = [
        state.halfRangeWorld.toFixed(4),
        state.minorWorldStep.toFixed(4),
        state.majorWorldStep.toFixed(4),
      ].join('|');

      if (gridMeshes.signature === signature) {
        return;
      }

      rebuildGridMeshes(scene, state, elevation);
      gridMeshes.signature = signature;
    }

    function projectToScreen(scene, camera, point) {
      return Vector3.Project(
        point,
        Matrix.IdentityReadOnly,
        scene.getTransformMatrix(),
        camera.viewport.toGlobal(mainCanvas.clientWidth, mainCanvas.clientHeight),
      );
    }

    function applyOrthographicBounds(camera) {
      const halfHeight = Math.max(0.25, camera.radius * Math.tan(camera.fov / 2));
      const aspect = engine.getAspectRatio(camera);
      const halfWidth = halfHeight * aspect;

      camera.orthoTop = halfHeight;
      camera.orthoBottom = -halfHeight;
      camera.orthoLeft = -halfWidth;
      camera.orthoRight = halfWidth;
    }

    function getSteppedGridValues(halfRangeValue, stepValue, includeBoundaries = false) {
      if (!Number.isFinite(stepValue) || stepValue <= 0) {
        return [0];
      }

      const values = [];
      const epsilon = 1e-6;
      const start = Math.ceil((-halfRangeValue - epsilon) / stepValue) * stepValue;
      const end = Math.floor((halfRangeValue + epsilon) / stepValue) * stepValue;

      for (let value = start; value <= end + epsilon; value += stepValue) {
        const snappedValue = Math.abs(value) < epsilon ? 0 : Number(value.toFixed(6));
        if (Math.abs(snappedValue) <= halfRangeValue + epsilon) {
          values.push(snappedValue);
        }
      }

      if (!includeBoundaries) {
        return values;
      }

      const negativeBoundary = -halfRangeValue;
      const positiveBoundary = halfRangeValue;
      if (!values.some((value) => Math.abs(value - negativeBoundary) < epsilon)) {
        values.unshift(negativeBoundary);
      }
      if (!values.some((value) => Math.abs(value - positiveBoundary) < epsilon)) {
        values.push(positiveBoundary);
      }

      return values;
    }

    function getProjectedGridBoundaries(scene, camera, halfRangeWorld, elevation) {
      const half = halfRangeWorld;
      const positiveY = projectToScreen(scene, camera, new Vector3(0, half, elevation));
      const negativeY = projectToScreen(scene, camera, new Vector3(0, -half, elevation));
      const positiveX = projectToScreen(scene, camera, new Vector3(half, 0, elevation));
      const negativeX = projectToScreen(scene, camera, new Vector3(-half, 0, elevation));

      return {
        rightY: positiveY.x >= negativeY.x ? half : -half,
        bottomX: positiveX.y >= negativeX.y ? half : -half,
      };
    }

    function createGridLabelMesh(name, text, rotationZ = 0) {
      const width = Math.max(1.1, text.length * 0.36 + 0.4);
      const height = 0.58;
      const plane = MeshBuilder.CreatePlane(name, { width, height }, scene);
      const textureWidth = 512;
      const textureHeight = 256;
      const texture = new DynamicTexture(`${name}_texture`, {
        width: textureWidth,
        height: textureHeight,
      }, scene, true);
      const ctx = texture.getContext();

      ctx.clearRect(0, 0, textureWidth, textureHeight);
      ctx.font = '400 100px "Segoe UI", "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#9d9d9d';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, textureWidth / 2, textureHeight / 2);

      texture.hasAlpha = true;
      texture.update();

      const material = new StandardMaterial(`${name}_material`, scene);
      material.diffuseTexture = texture;
      material.emissiveTexture = texture;
      material.useAlphaFromDiffuseTexture = true;
      material.disableLighting = true;
      material.backFaceCulling = false;

      plane.material = material;
      plane.rotation.z = rotationZ;
      plane.isPickable = false;
      plane.renderingGroupId = 1;

      return plane;
    }

    const gridLabelMeshes = {
      right: { signature: null, entries: [] },
      bottom: { signature: null, entries: [] },
    };

    function disposeGridLabelEntries(entries) {
      for (const entry of entries) {
        if (entry.mesh.material) {
          entry.mesh.material.dispose(false, true);
        }
        entry.mesh.dispose();
      }
    }

    function buildGridLabelEntries(axis, state, config) {
      const entries = [];

      for (const value of getSteppedGridValues(state.halfRangeValue, state.majorValueStep, true)) {
        const snappedValue = Math.abs(value) < 1e-6 ? 0 : Number(value.toFixed(6));
        const labelText = `${Math.round(Math.abs(snappedValue))}`;
        const rotationZ = axis === 'right' ? Math.PI / 2 : 0;

        entries.push({
          value: snappedValue / config.coordinateScale,
          mesh: createGridLabelMesh(
            `grid_${axis}_${state.majorValueStep}_${state.halfRangeWorld}_${snappedValue}`,
            labelText,
            rotationZ,
          ),
        });
      }

      return entries;
    }

    function getNiceCeilStep(value) {
      if (!Number.isFinite(value) || value <= 0) {
        return 1;
      }

      const exponent = Math.floor(Math.log10(value));
      const magnitude = 10 ** exponent;
      const normalized = value / magnitude;

      for (const factor of [1, 2, 2.5, 5, 10]) {
        if (normalized <= factor) {
          return factor * magnitude;
        }
      }

      return 10 * magnitude;
    }

    function getAdaptiveGridState(scene, camera, config) {
      const unitWorldStep = 1 / config.coordinateScale;
      const origin = projectToScreen(scene, camera, new Vector3(0, 0, config.elevation));
      const xUnit = projectToScreen(scene, camera, new Vector3(unitWorldStep, 0, config.elevation));
      const yUnit = projectToScreen(scene, camera, new Vector3(0, unitWorldStep, config.elevation));
      const pixelPerValueUnit = Math.max(
        1e-4,
        (Math.hypot(xUnit.x - origin.x, xUnit.y - origin.y) +
          Math.hypot(yUnit.x - origin.x, yUnit.y - origin.y)) / 2,
      );
      const roughMajorValueStep = config.targetMajorPixelSpacing / pixelPerValueUnit;
      const majorValueStep = Math.min(
        config.maxMajorValueStep,
        Math.max(config.minMajorValueStep, getNiceCeilStep(roughMajorValueStep)),
      );
      const minorValueStep = majorValueStep / config.minorPerMajor;
      const halfRangeValue = config.halfRangeValue;
      const halfRangeWorld = halfRangeValue / config.coordinateScale;

      return {
        coordinateScale: config.coordinateScale,
        halfRangeValue,
        halfRangeWorld,
        size: halfRangeWorld * 2,
        majorValueStep,
        minorValueStep,
        majorWorldStep: majorValueStep / config.coordinateScale,
        minorWorldStep: minorValueStep / config.coordinateScale,
      };
    }

    function ensureGridCoordinateMeshes(state, config) {
      for (const axis of ['right', 'bottom']) {
        const signature = `${state.halfRangeWorld.toFixed(4)}|${state.majorValueStep}`;
        if (gridLabelMeshes[axis].signature === signature) {
          continue;
        }

        disposeGridLabelEntries(gridLabelMeshes[axis].entries);
        gridLabelMeshes[axis].entries = buildGridLabelEntries(axis, state, config);
        gridLabelMeshes[axis].signature = signature;
      }
    }

    // Coordinate labels are real scene meshes attached to the projected outer grid edges.
    function updateGridCoordinateMeshes(scene, camera, state, config) {
      ensureGridCoordinateMeshes(state, config);

      const labelHeight = config.elevation + 0.03;
      const worldOffset = Math.min(Math.max(state.minorWorldStep * 0.4, 0.16), 0.42);
      const { rightY, bottomX } = getProjectedGridBoundaries(
        scene,
        camera,
        state.halfRangeWorld,
        config.elevation,
      );
      const rightYDirection = Math.sign(rightY) || 1;
      const bottomXDirection = Math.sign(bottomX) || 1;
      const rightRotation = rightYDirection > 0 ? Math.PI / 2 : -Math.PI / 2;
      const bottomRotation = bottomXDirection > 0 ? 0 : Math.PI;

      for (const label of gridLabelMeshes.right.entries) {
        label.mesh.position.set(label.value, rightY + rightYDirection * worldOffset, labelHeight);
        label.mesh.rotation.z = rightRotation;
      }

      for (const label of gridLabelMeshes.bottom.entries) {
        label.mesh.position.set(bottomX + bottomXDirection * worldOffset, label.value, labelHeight);
        label.mesh.rotation.z = bottomRotation;
      }
    }

    function updateAdaptiveGrid(scene, camera, config) {
      const state = getAdaptiveGridState(scene, camera, config);
      syncGridMeshes(scene, state, config.elevation);
      updateGridCoordinateMeshes(scene, camera, state, config);
    }

    // Z-up camera
    const camera = new ArcRotateCamera('cam', Math.PI * 0.25, Math.PI * 0.25, 15, Vector3.Zero(), scene);
    camera.upVector = new Vector3(0, 0, 1);
    camera.lowerBetaLimit = null;
    camera.upperBetaLimit = null;
    camera.allowUpsideDown = true;
    camera.minZ = 0.1;
    camera.angularSensibilityX = 4500;
    camera.angularSensibilityY = 4500;
    camera.attachControl(mainCanvas, true);

    // Light
    const light = new HemisphericLight('light', new Vector3(0.3, -0.5, 1), scene);
    light.intensity = 0.9;

    // Simple cube
    const box = MeshBuilder.CreateBox('box', { size: 2 }, scene);
    box.position.z = 1;
    const boxMat = new StandardMaterial('boxMat', scene);
    boxMat.diffuseColor = new Color3(0.2, 0.6, 0.9);
    box.material = boxMat;

    engine.runRenderLoop(() => {
      updateAdaptiveGrid(scene, camera, gridConfig);
      scene.render();
    });
    window.addEventListener('resize', () => engine.resize());

    // --- ViewCube ---
    let cubeViewDriving = false;

    const cubeView = new CubeView({
      canvas: document.getElementById('cubeViewCanvas'),
      width: 150,
      height: 150,
      aspect: 1,
      hoverColor: '#0088ff',
      cubeSize: 2,
      zoom: 16,
      antialias: true,
      onProjectionModeChange: (mode) => {
        if (mode === 'orthographic') {
          camera.mode = Camera.ORTHOGRAPHIC_CAMERA;
          applyOrthographicBounds(camera);
        } else {
          camera.mode = Camera.PERSPECTIVE_CAMERA;
        }
      },
      onOrientationChange: ({ orientation, phase }) => {
        if (phase === 'start') {
          cubeViewDriving = true;
        }

        camera.alpha = orientation.alpha;
        camera.beta = orientation.beta;

        if (phase === 'end') {
          cubeViewDriving = false;
        }
      }
    });

    // Keep the cube synced to the scene camera whenever the scene is driving.
    camera.onViewMatrixChangedObservable.add(() => {
      if (!cubeViewDriving) {
        cubeView.setOrientation({
          alpha: camera.alpha,
          beta: camera.beta,
        });
      }
      if (camera.mode === Camera.ORTHOGRAPHIC_CAMERA) {
        applyOrthographicBounds(camera);
      }
    });

    cubeView.setOrientation({
      alpha: camera.alpha,
      beta: camera.beta,
    });

    // Expose for e2e tests
    window.cubeView = cubeView;

    // Language toggle
    const langBtn = document.getElementById('langBtn');
    langBtn.addEventListener('click', () => {
      const current = cubeView.getLocale();
      const next = current === 'en' ? 'zh' : 'en';
      cubeView.setLocale(next);
      langBtn.textContent = next === 'en' ? '中文' : 'EN';
    });
  </script>
</body>
</html>
