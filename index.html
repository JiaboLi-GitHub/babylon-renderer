<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babylon.js CubeView</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      margin-bottom: 8px;
      font-weight: 300;
      font-size: 28px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .demos {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }
    .demo-card {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .demo-card h3 {
      margin-bottom: 12px;
      font-weight: 400;
      font-size: 16px;
      color: #aaa;
    }
    .angle-display {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Babylon.js CubeView</h1>
  <p class="subtitle">Interactive 3D navigation cube &mdash; rewrite of react-cubeview using Babylon.js</p>

  <div class="demos">
    <div class="demo-card">
      <h3>Simple (200x200)</h3>
      <canvas id="cube1" width="200" height="200"></canvas>
      <div class="angle-display" id="angles1"></div>
    </div>

    <div class="demo-card">
      <h3>Bigger (400x400)</h3>
      <canvas id="cube2" width="400" height="400"></canvas>
      <div class="angle-display" id="angles2"></div>
    </div>

    <div class="demo-card">
      <h3>Custom Color (red hover)</h3>
      <canvas id="cube3" width="250" height="250"></canvas>
      <div class="angle-display" id="angles3"></div>
    </div>
  </div>

  <script type="module">
    import { CubeView } from './src/index.ts';

    const cv1 = new CubeView({
      canvas: document.getElementById('cube1'),
      width: 200,
      height: 200,
      aspect: 1,
      hoverColor: '#0088ff',
      cubeSize: 2,
      zoom: 6,
      antialias: false,
      onUpdateAngles: (phi, theta) => {
        document.getElementById('angles1').textContent =
          `phi: ${(phi / Math.PI).toFixed(3)}π  theta: ${(theta / Math.PI).toFixed(3)}π`;
      }
    });

    const cv2 = new CubeView({
      canvas: document.getElementById('cube2'),
      width: 400,
      height: 400,
      aspect: 1,
      hoverColor: '#0088ff',
      cubeSize: 2,
      zoom: 6,
      antialias: true,
      onUpdateAngles: (phi, theta) => {
        document.getElementById('angles2').textContent =
          `phi: ${(phi / Math.PI).toFixed(3)}π  theta: ${(theta / Math.PI).toFixed(3)}π`;
      }
    });

    const cv3 = new CubeView({
      canvas: document.getElementById('cube3'),
      width: 250,
      height: 250,
      aspect: 1,
      hoverColor: '#ff0000',
      cubeSize: 2,
      zoom: 6,
      antialias: true,
      onUpdateAngles: (phi, theta) => {
        document.getElementById('angles3').textContent =
          `phi: ${(phi / Math.PI).toFixed(3)}π  theta: ${(theta / Math.PI).toFixed(3)}π`;
      }
    });
  </script>
</body>
</html>
