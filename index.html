<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babylon.js Scene + ViewCube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    body { position: relative; }
    #mainCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #cubeViewWrapper {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }
    #langBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 6px 14px;
      background: rgba(40, 40, 40, 0.8);
      color: #ddd;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #langBtn:hover { background: rgba(60, 60, 60, 0.9); }
    #ioToolbar {
      position: absolute;
      top: 10px;
      left: 92px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(8px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
    }
    .toolbar-button {
      padding: 6px 12px;
      background: #1f2937;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 160ms ease, opacity 160ms ease;
    }
    .toolbar-button:hover { background: #111827; }
    .toolbar-button.secondary {
      background: #475569;
    }
    .toolbar-button.secondary:hover {
      background: #334155;
    }
    .toolbar-button:disabled,
    .toolbar-button.is-disabled {
      cursor: wait;
      opacity: 0.55;
    }
    #stepFileInput {
      display: none;
    }
    .toolbar-field {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      font-size: 12px;
      font-weight: 600;
    }
    #unitSelect {
      min-width: 86px;
      height: 30px;
      padding: 0 28px 0 9px;
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      font: inherit;
      cursor: pointer;
    }
    #materialPicker {
      position: relative;
    }
    #materialPanel {
      position: absolute;
      top: 38px;
      left: 0;
      z-index: 30;
      display: none;
      min-width: 176px;
      max-height: min(70vh, 320px);
      overflow-y: auto;
      padding: 6px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(15, 23, 42, 0.14);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(8px);
    }
    #materialPanel.is-open {
      display: block;
    }
    .material-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #1f2937;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
    }
    .material-option:hover,
    .material-option.is-selected {
      background: rgba(15, 23, 42, 0.08);
    }
    .material-swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.2);
      flex: none;
    }
    .material-swatch.default {
      background: #3399e6;
    }
    .material-swatch.matte-gray {
      background: #8f98a5;
    }
    .material-swatch.aluminum {
      background: linear-gradient(135deg, #f3f4f6 0%, #a7b0bb 48%, #f8fafc 100%);
    }
    .material-swatch.steel {
      background: linear-gradient(135deg, #737b86 0%, #2f3640 52%, #a8b0ba 100%);
    }
    .material-swatch.graphite {
      background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
    }
    .material-swatch.brass {
      background: linear-gradient(135deg, #f1c75b 0%, #9b681f 52%, #ffd56f 100%);
    }
    .material-swatch.walnut {
      background:
        repeating-linear-gradient(90deg, rgba(20, 8, 4, 0.9) 0 2px, rgba(92, 42, 18, 0.95) 2px 5px),
        #5a2a12;
    }
    .toolbar-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 30px;
      color: #334155;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .toolbar-switch input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .switch-track {
      position: relative;
      width: 34px;
      height: 18px;
      border-radius: 999px;
      background: #cbd5e1;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.14);
      transition: background 160ms ease, box-shadow 160ms ease;
    }
    .switch-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.28);
      transition: transform 160ms ease;
    }
    .toolbar-switch input:checked + .switch-track {
      background: #2563eb;
      box-shadow: inset 0 0 0 1px rgba(29, 78, 216, 0.3);
    }
    .toolbar-switch input:checked + .switch-track::after {
      transform: translateX(16px);
    }
    .toolbar-switch input:focus-visible + .switch-track {
      outline: 2px solid rgba(37, 99, 235, 0.38);
      outline-offset: 2px;
    }
    .toolbar-switch.is-disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    #ioStatus {
      min-width: 220px;
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
    }
    #scaleBar {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      color: #334155;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      font-weight: 650;
      line-height: 1;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.95);
    }
    #scaleBarLine {
      width: 96px;
      height: 8px;
      border-left: 2px solid #334155;
      border-right: 2px solid #334155;
      border-bottom: 2px solid #334155;
    }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>
  <button id="langBtn">中文</button>
  <div id="ioToolbar">
    <label id="stepImportLabel" class="toolbar-button" for="stepFileInput">Load STEP</label>
    <input id="stepFileInput" type="file" accept=".step,.stp">
    <button id="stepExportBtn" class="toolbar-button secondary" type="button">Export STEP</button>
    <label class="toolbar-field" for="unitSelect">
      Unit
      <select id="unitSelect"></select>
    </label>
    <div id="materialPicker">
      <button id="materialPickerBtn" class="toolbar-button secondary" type="button">材质：默认</button>
      <div id="materialPanel" role="dialog" aria-label="材质">
        <button class="material-option is-selected" type="button" data-material-mode="default">
          <span class="material-swatch default"></span>
          默认
        </button>
        <button class="material-option" type="button" data-material-mode="matteGray">
          <span class="material-swatch matte-gray"></span>
          哑光灰
        </button>
        <button class="material-option" type="button" data-material-mode="aluminum">
          <span class="material-swatch aluminum"></span>
          铝
        </button>
        <button class="material-option" type="button" data-material-mode="steel">
          <span class="material-swatch steel"></span>
          钢
        </button>
        <button class="material-option" type="button" data-material-mode="graphite">
          <span class="material-swatch graphite"></span>
          石墨
        </button>
        <button class="material-option" type="button" data-material-mode="brass">
          <span class="material-swatch brass"></span>
          黄铜
        </button>
        <button class="material-option" type="button" data-material-mode="walnut">
          <span class="material-swatch walnut"></span>
          胡桃木
        </button>
      </div>
    </div>
    <label id="ssaoToggleLabel" class="toolbar-switch" for="ssaoToggle">
      <input id="ssaoToggle" type="checkbox" checked>
      <span class="switch-track" aria-hidden="true"></span>
      SSAO
    </label>
    <label id="shadowToggleLabel" class="toolbar-switch" for="shadowToggle">
      <input id="shadowToggle" type="checkbox" checked>
      <span class="switch-track" aria-hidden="true"></span>
      Shadow
    </label>
    <span id="ioStatus">Ready.</span>
  </div>
  <div id="cubeViewWrapper">
    <canvas id="cubeViewCanvas" width="150" height="150"></canvas>
  </div>
  <div id="scaleBar" aria-hidden="true">
    <div id="scaleBarLabel">--</div>
    <div id="scaleBarLine"></div>
  </div>

  <script type="module">
    import {
      Engine, Scene, ArcRotateCamera, Camera, Vector3, HemisphericLight, DirectionalLight,
      Matrix, Material, MeshBuilder, StandardMaterial, DynamicTexture, Color3, Color4, TransformNode,
    } from '@babylonjs/core';
    import { ShadowGenerator } from '@babylonjs/core/Lights/Shadows/shadowGenerator.js';
    import { SSAO2RenderingPipeline } from '@babylonjs/core/PostProcesses/RenderPipeline/Pipelines/ssao2RenderingPipeline.js';
    import { ShadowOnlyMaterial } from '@babylonjs/materials/shadowOnly/shadowOnlyMaterial.js';
    import {
      CubeView,
      DEFAULT_LENGTH_UNIT,
      GridMap,
      LENGTH_UNITS,
      getGridUnitOptions,
      getLengthUnitDefinition,
    } from './src/index.ts';
    import { loadStepModel, exportMeshesToStep } from './src/stepModelIO.js';
    import {
      CAM_MATERIAL_PRESET_KEYS,
      createCamMaterialPreset,
      getCamMaterialPresetLabel,
    } from './src/materialPresets.ts';
    import { createWalnutPbrMaterial, ensureWalnutPbrUvs } from './src/walnutPbrMaterial.ts';

    // --- Main Scene ---
    const mainCanvas = document.getElementById('mainCanvas');
    const engine = new Engine(mainCanvas, true, { preserveDrawingBuffer: true });
    const scene = new Scene(engine);
    scene.clearColor = new Color4(1, 1, 1, 1);
    scene.useRightHandedSystem = true;
    scene.imageProcessingConfiguration.exposure = 0.88;
    scene.imageProcessingConfiguration.contrast = 1.08;

    function applyOrthographicBounds(camera) {
      const halfHeight = Math.max(0.25, camera.radius * Math.tan(camera.fov / 2));
      const aspect = engine.getAspectRatio(camera);
      const halfWidth = halfHeight * aspect;

      camera.orthoTop = halfHeight;
      camera.orthoBottom = -halfHeight;
      camera.orthoLeft = -halfWidth;
      camera.orthoRight = halfWidth;
    }

    // Z-up camera
    const camera = new ArcRotateCamera('cam', Math.PI * 0.25, Math.PI * 0.25, 15, Vector3.Zero(), scene);
    camera.upVector = new Vector3(0, 0, 1);
    camera.lowerBetaLimit = null;
    camera.upperBetaLimit = null;
    camera.allowUpsideDown = true;
    camera.minZ = 0.1;
    camera.angularSensibilityX = 4500;
    camera.angularSensibilityY = 4500;
    camera.attachControl(mainCanvas, true);

    const CAM_SSAO_PIPELINE_NAME = 'camSsaoPipeline';
    const camSsaoPipeline = SSAO2RenderingPipeline.IsSupported
      ? new SSAO2RenderingPipeline(CAM_SSAO_PIPELINE_NAME, scene, { ssaoRatio: 0.75, blurRatio: 0.75 }, [camera])
      : null;

    if (camSsaoPipeline) {
      camSsaoPipeline.samples = 16;
      camSsaoPipeline.textureSamples = 1;
      camSsaoPipeline.totalStrength = 0.68;
      camSsaoPipeline.base = 0.08;
      camSsaoPipeline.radius = 0.45;
      camSsaoPipeline.maxZ = 80;
      camSsaoPipeline.minZAspect = 0.18;
      camSsaoPipeline.epsilon = 0.035;
      camSsaoPipeline.expensiveBlur = true;
      camSsaoPipeline.bilateralSamples = 12;
      camSsaoPipeline.bilateralSoften = 0.38;
      camSsaoPipeline.bilateralTolerance = 0.45;
    }

    // CAM-style viewport lighting: high readability, low contrast, no cast shadows.
    scene.ambientColor = new Color3(0.22, 0.22, 0.22);

    const hemiLight = new HemisphericLight('camAmbientLight', new Vector3(0.15, -0.25, 1), scene);
    hemiLight.intensity = 0.86;
    hemiLight.groundColor = new Color3(0.82, 0.84, 0.88);
    hemiLight.specular = new Color3(0.2, 0.2, 0.2);
    hemiLight.shadowEnabled = false;

    const viewKeyLight = new DirectionalLight('camViewKeyLight', new Vector3(0.35, -0.28, 1), scene);
    viewKeyLight.intensity = 0.48;
    viewKeyLight.autoCalcShadowZBounds = false;
    viewKeyLight.shadowEnabled = false;

    const viewFillLight = new DirectionalLight('camViewFillLight', new Vector3(-0.55, 0.1, 1), scene);
    viewFillLight.intensity = 0.16;
    viewFillLight.diffuse = new Color3(0.88, 0.9, 1);
    viewFillLight.autoCalcShadowZBounds = false;
    viewFillLight.shadowEnabled = false;

    const fixedRimLight = new DirectionalLight('camFixedRimLight', new Vector3(0.2, 0.55, -0.7), scene);
    fixedRimLight.intensity = 0.12;
    fixedRimLight.diffuse = new Color3(1, 0.96, 0.9);
    fixedRimLight.autoCalcShadowZBounds = false;
    fixedRimLight.shadowEnabled = false;

    const stableShadowLight = new DirectionalLight('camStableShadowLight', new Vector3(0, 0, -1), scene);
    stableShadowLight.position = new Vector3(0, 0, 34);
    stableShadowLight.intensity = 0.08;
    stableShadowLight.diffuse = new Color3(0.8, 0.82, 0.86);
    stableShadowLight.specular = Color3.Black();
    stableShadowLight.autoUpdateExtends = true;
    stableShadowLight.autoCalcShadowZBounds = true;
    stableShadowLight.shadowOrthoScale = 0.24;
    stableShadowLight.shadowEnabled = true;

    const camShadowGenerator = new ShadowGenerator(2048, stableShadowLight);
    camShadowGenerator.useBlurExponentialShadowMap = true;
    camShadowGenerator.blurKernel = 36;
    camShadowGenerator.darkness = 0.52;
    camShadowGenerator.transparencyShadow = true;

    const camShadowGround = MeshBuilder.CreatePlane('camShadowGround', { size: 1 }, scene);
    camShadowGround.isPickable = false;
    camShadowGround.receiveShadows = true;
    camShadowGround.renderingGroupId = 0;
    camShadowGround.alphaIndex = 0;

    const camShadowMaterial = new ShadowOnlyMaterial('camShadowOnlyMaterial', scene);
    camShadowMaterial.activeLight = stableShadowLight;
    camShadowMaterial.shadowColor = new Color3(0.16, 0.17, 0.18);
    camShadowMaterial.alpha = 0.38;
    camShadowMaterial.backFaceCulling = false;
    camShadowMaterial.transparencyMode = Material.MATERIAL_ALPHABLEND;
    camShadowMaterial.disableDepthWrite = true;
    camShadowMaterial.needDepthPrePass = false;
    camShadowGround.material = camShadowMaterial;

    const contactShadowTexture = new DynamicTexture('camContactShadowTexture', {
      width: 512,
      height: 512,
    }, scene, false);
    contactShadowTexture.hasAlpha = true;
    const contactShadowContext = contactShadowTexture.getContext();
    const contactShadowGradient = contactShadowContext.createRadialGradient(256, 256, 22, 256, 256, 250);
    contactShadowGradient.addColorStop(0, 'rgba(0, 0, 0, 0.28)');
    contactShadowGradient.addColorStop(0.58, 'rgba(0, 0, 0, 0.13)');
    contactShadowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
    contactShadowContext.clearRect(0, 0, 512, 512);
    contactShadowContext.fillStyle = contactShadowGradient;
    contactShadowContext.fillRect(0, 0, 512, 512);
    contactShadowTexture.update(false);

    const camContactShadow = MeshBuilder.CreatePlane('camContactShadow', { size: 1 }, scene);
    camContactShadow.isPickable = false;
    camContactShadow.renderingGroupId = 0;
    camContactShadow.alphaIndex = 1;

    const camContactShadowMaterial = new StandardMaterial('camContactShadowMaterial', scene);
    camContactShadowMaterial.diffuseTexture = contactShadowTexture;
    camContactShadowMaterial.emissiveTexture = contactShadowTexture;
    camContactShadowMaterial.useAlphaFromDiffuseTexture = true;
    camContactShadowMaterial.disableLighting = true;
    camContactShadowMaterial.specularColor = Color3.Black();
    camContactShadowMaterial.backFaceCulling = false;
    camContactShadowMaterial.transparencyMode = Material.MATERIAL_ALPHABLEND;
    camContactShadowMaterial.disableDepthWrite = true;
    camContactShadowMaterial.needDepthPrePass = false;
    camContactShadow.material = camContactShadowMaterial;

    for (const light of [hemiLight, viewKeyLight, viewFillLight, fixedRimLight]) {
      light.excludedMeshes.push(camShadowGround);
      light.excludedMeshes.push(camContactShadow);
    }

    const viewForward = new Vector3();
    const viewRight = new Vector3();
    const viewUp = new Vector3();

    function setCameraSpaceLightDirection(light, cameraSpaceDirection) {
      camera.getTarget().subtractToRef(camera.globalPosition, viewForward);
      viewForward.normalize();
      Vector3.CrossToRef(viewForward, camera.upVector, viewRight);
      viewRight.normalize();
      Vector3.CrossToRef(viewRight, viewForward, viewUp);
      viewUp.normalize();

      light.direction.copyFrom(viewForward).scaleInPlace(cameraSpaceDirection.z);
      light.direction.addInPlace(viewRight.scale(cameraSpaceDirection.x));
      light.direction.addInPlace(viewUp.scale(cameraSpaceDirection.y));
      light.direction.normalize();

      light.position.copyFrom(camera.globalPosition);
      light.position.subtractInPlace(light.direction.scale(20));
    }

    function updateCamViewportLights() {
      setCameraSpaceLightDirection(viewKeyLight, { x: 0.35, y: -0.28, z: 1 });
      setCameraSpaceLightDirection(viewFillLight, { x: -0.55, y: 0.12, z: 1 });
    }
    updateCamViewportLights();

    let currentUnit = DEFAULT_LENGTH_UNIT;
    let currentGridUnitOptions = getGridUnitOptions(currentUnit);

    const gridMap = new GridMap({
      scene,
      camera,
      canvas: mainCanvas,
      ...currentGridUnitOptions,
    });

    const MATERIAL_MODES = {
      DEFAULT: 'default',
      WALNUT: 'walnut',
    };
    const MATERIAL_MODE_LABELS = {
      [MATERIAL_MODES.DEFAULT]: '默认',
      ...Object.fromEntries(CAM_MATERIAL_PRESET_KEYS.map((key) => [key, getCamMaterialPresetLabel(key)])),
      [MATERIAL_MODES.WALNUT]: '胡桃木',
    };
    const MATERIAL_MODE_KEYS = [
      MATERIAL_MODES.DEFAULT,
      ...CAM_MATERIAL_PRESET_KEYS,
      MATERIAL_MODES.WALNUT,
    ];
    let currentMaterialMode = MATERIAL_MODES.DEFAULT;
    let activeOverrideMaterial = null;
    let ssaoEnabled = Boolean(camSsaoPipeline);
    let shadowsEnabled = true;

    function getOverrideMaterialName(mode, name) {
      return `${(name || 'model').replace(/[^a-z0-9_]+/gi, '_')}_${mode}Pbr`;
    }

    function captureDefaultMaterials(root) {
      for (const mesh of root.getChildMeshes()) {
        mesh.metadata = mesh.metadata ?? {};
        if (!mesh.metadata.rendererDefaultMaterial) {
          mesh.metadata.rendererDefaultMaterial = mesh.material;
        }
      }
    }

    function disposeActiveOverrideMaterial() {
      if (activeOverrideMaterial) {
        activeOverrideMaterial.dispose();
      }
      activeOverrideMaterial = null;
    }

    function disposeStoredDefaultMaterials(root) {
      const materialsToDispose = new Set();
      for (const mesh of root.getChildMeshes()) {
        const defaultMaterial = mesh.metadata?.rendererDefaultMaterial;
        if (defaultMaterial && defaultMaterial !== mesh.material) {
          materialsToDispose.add(defaultMaterial);
        }
      }

      for (const material of materialsToDispose) {
        material.dispose();
      }
    }

    function applySharedMaterialToRoot(root, material, { ensureUvs = false } = {}) {
      disposeActiveOverrideMaterial();
      captureDefaultMaterials(root);
      activeOverrideMaterial = material;

      for (const mesh of root.getChildMeshes()) {
        if (ensureUvs) {
          ensureWalnutPbrUvs(mesh);
        }
        mesh.material = material;
      }

      return material;
    }

    function applyDefaultMaterialsToRoot(root) {
      for (const mesh of root.getChildMeshes()) {
        mesh.material = mesh.metadata?.rendererDefaultMaterial ?? mesh.material;
      }
      disposeActiveOverrideMaterial();
    }

    function applyMaterialModeToRoot(root) {
      if (currentMaterialMode === MATERIAL_MODES.WALNUT) {
        const material = createWalnutPbrMaterial(scene, {
          name: getOverrideMaterialName(currentMaterialMode, activeModelSummary?.name ?? root.name),
        });
        applySharedMaterialToRoot(root, material, { ensureUvs: true });
        return;
      }

      if (CAM_MATERIAL_PRESET_KEYS.includes(currentMaterialMode)) {
        const material = createCamMaterialPreset(scene, currentMaterialMode, {
          name: getOverrideMaterialName(currentMaterialMode, activeModelSummary?.name ?? root.name),
        });
        applySharedMaterialToRoot(root, material);
        return;
      }

      applyDefaultMaterialsToRoot(root);
    }

    function createDefaultModelRoot() {
      const root = new TransformNode('modelRoot', scene);
      const box = MeshBuilder.CreateBox('box', { size: 2 }, scene);
      box.parent = root;
      box.position.z = 1;

      const boxMat = new StandardMaterial('defaultCubeMaterial', scene);
      boxMat.diffuseColor = new Color3(0.2, 0.6, 0.9);
      boxMat.specularColor = new Color3(0.12, 0.12, 0.12);
      boxMat.specularPower = 48;
      box.material = boxMat;
      captureDefaultMaterials(root);

      return root;
    }

    let modelRoot = createDefaultModelRoot();
    let activeModelSummary = {
      name: 'default-cube',
      meshCount: 1,
      triangleCount: 12,
    };
    let ioBusy = false;
    let ioStatusText = 'Ready.';

    const ioStatus = document.getElementById('ioStatus');
    const stepFileInput = document.getElementById('stepFileInput');
    const stepImportLabel = document.getElementById('stepImportLabel');
    const stepExportBtn = document.getElementById('stepExportBtn');
    const unitSelect = document.getElementById('unitSelect');
    const materialPickerBtn = document.getElementById('materialPickerBtn');
    const materialPanel = document.getElementById('materialPanel');
    const materialOptions = [...document.querySelectorAll('[data-material-mode]')];
    const ssaoToggle = document.getElementById('ssaoToggle');
    const ssaoToggleLabel = document.getElementById('ssaoToggleLabel');
    const shadowToggle = document.getElementById('shadowToggle');
    const shadowToggleLabel = document.getElementById('shadowToggleLabel');
    const scaleBar = document.getElementById('scaleBar');
    const scaleBarLabel = document.getElementById('scaleBarLabel');
    const scaleBarLine = document.getElementById('scaleBarLine');
    const scaleBarState = {
      visible: false,
      label: '',
      unitLabel: currentGridUnitOptions.unitLabel,
      value: 0,
      pixelWidth: 0,
    };

    for (const unit of LENGTH_UNITS) {
      const option = document.createElement('option');
      option.value = unit.key;
      option.textContent = unit.abbreviation;
      option.title = unit.label;
      unitSelect.appendChild(option);
    }
    unitSelect.value = currentUnit;

    function setIoStatus(text) {
      ioStatusText = text;
      ioStatus.textContent = text;
    }

    function syncRenderSwitchUi() {
      ssaoToggle.checked = ssaoEnabled;
      ssaoToggle.disabled = ioBusy || !camSsaoPipeline;
      ssaoToggleLabel.classList.toggle('is-disabled', ssaoToggle.disabled);

      shadowToggle.checked = shadowsEnabled;
      shadowToggle.disabled = ioBusy;
      shadowToggleLabel.classList.toggle('is-disabled', shadowToggle.disabled);
    }

    function setSsaoEnabled(enabled, { silent = false } = {}) {
      const nextEnabled = Boolean(enabled && camSsaoPipeline);

      if (camSsaoPipeline && ssaoEnabled !== nextEnabled) {
        const pipelineManager = scene.postProcessRenderPipelineManager;
        if (nextEnabled) {
          pipelineManager.attachCamerasToRenderPipeline(CAM_SSAO_PIPELINE_NAME, [camera], true);
        } else {
          pipelineManager.detachCamerasFromRenderPipeline(CAM_SSAO_PIPELINE_NAME, [camera]);
        }
      }

      ssaoEnabled = nextEnabled;
      syncRenderSwitchUi();

      if (!silent) {
        setIoStatus(camSsaoPipeline
          ? `SSAO ${ssaoEnabled ? 'enabled' : 'disabled'}.`
          : 'SSAO is not supported.');
      }
    }

    function setShadowEnabled(enabled, { silent = false } = {}) {
      shadowsEnabled = Boolean(enabled);
      stableShadowLight.shadowEnabled = shadowsEnabled;
      updateCamShadowGround();
      syncRenderSwitchUi();

      if (!silent) {
        setIoStatus(`Shadow ${shadowsEnabled ? 'enabled' : 'disabled'}.`);
      }
    }

    function setIoBusy(busy) {
      ioBusy = busy;
      stepFileInput.disabled = busy;
      stepExportBtn.disabled = busy;
      unitSelect.disabled = busy;
      materialPickerBtn.disabled = busy;
      stepImportLabel.classList.toggle('is-disabled', busy);
      syncRenderSwitchUi();
    }

    function setProjectUnit(unit) {
      const nextUnit = getLengthUnitDefinition(unit).key;
      currentUnit = nextUnit;
      currentGridUnitOptions = getGridUnitOptions(currentUnit);
      unitSelect.value = currentUnit;
      gridMap.setUnitOptions(currentGridUnitOptions);
      fitCameraToModel(modelRoot.getChildMeshes());
      gridMap.fitToMeshes(modelRoot.getChildMeshes());
      gridMap.update();
      updateScaleBar();
      setIoStatus(`Unit set to ${currentGridUnitOptions.unitLabel}.`);
    }

    unitSelect.addEventListener('change', () => {
      setProjectUnit(unitSelect.value);
    });

    function updateMaterialPickerUi() {
      materialPickerBtn.textContent = `材质：${MATERIAL_MODE_LABELS[currentMaterialMode]}`;
      for (const option of materialOptions) {
        option.classList.toggle('is-selected', option.dataset.materialMode === currentMaterialMode);
      }
    }

    function setMaterialPanelOpen(open) {
      materialPanel.classList.toggle('is-open', open);
      materialPickerBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function setMaterialMode(mode) {
      if (!MATERIAL_MODE_KEYS.includes(mode)) {
        return;
      }

      if (currentMaterialMode === mode) {
        setMaterialPanelOpen(false);
        return;
      }

      currentMaterialMode = mode;
      applyMaterialModeToRoot(modelRoot);
      updateMaterialPickerUi();
      setMaterialPanelOpen(false);
      setIoStatus(`材质已设置为${MATERIAL_MODE_LABELS[currentMaterialMode]}。`);
    }

    materialPickerBtn.addEventListener('click', () => {
      if (ioBusy) {
        return;
      }
      setMaterialPanelOpen(!materialPanel.classList.contains('is-open'));
    });

    for (const option of materialOptions) {
      option.addEventListener('click', () => {
        setMaterialMode(option.dataset.materialMode);
      });
    }

    document.addEventListener('mousedown', (event) => {
      if (!materialPanel.classList.contains('is-open')) {
        return;
      }

      const picker = document.getElementById('materialPicker');
      if (!picker.contains(event.target)) {
        setMaterialPanelOpen(false);
      }
    }, true);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setMaterialPanelOpen(false);
      }
    });

    ssaoToggle.addEventListener('change', () => {
      setSsaoEnabled(ssaoToggle.checked);
    });

    shadowToggle.addEventListener('change', () => {
      setShadowEnabled(shadowToggle.checked);
    });

    updateMaterialPickerUi();
    syncRenderSwitchUi();

    function getModelBounds(meshes) {
      if (!meshes.length) {
        return null;
      }

      const min = new Vector3(Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY, Number.POSITIVE_INFINITY);
      const max = new Vector3(Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY, Number.NEGATIVE_INFINITY);

      for (const mesh of meshes) {
        mesh.computeWorldMatrix(true);
        const boundingInfo = mesh.getBoundingInfo();
        min.minimizeInPlace(boundingInfo.boundingBox.minimumWorld);
        max.maximizeInPlace(boundingInfo.boundingBox.maximumWorld);
      }

      const center = min.add(max).scale(0.5);
      const extents = max.subtract(min).scale(0.5);

      return {
        min,
        max,
        center,
        boundingRadius: extents.length(),
        halfRangeXYWorld: Math.max(
          Math.abs(min.x),
          Math.abs(max.x),
          Math.abs(min.y),
          Math.abs(max.y),
          1,
        ),
      };
    }

    function updateCamSsao(bounds) {
      if (!camSsaoPipeline || !bounds) {
        return;
      }

      camSsaoPipeline.radius = Math.max(0.08, Math.min(3.5, bounds.boundingRadius * 0.16));
      camSsaoPipeline.maxZ = Math.max(20, camera.radius * 2.8, bounds.boundingRadius * 5);
    }

    function fitCameraToModel(meshes) {
      const bounds = getModelBounds(meshes);
      if (!bounds) {
        return;
      }

      const { center, boundingRadius } = bounds;
      const safeRadius = Math.max(4, (boundingRadius / Math.sin(camera.fov / 2)) * 1.15);

      camera.target.copyFrom(center);
      camera.radius = safeRadius;

      if (camera.mode === Camera.ORTHOGRAPHIC_CAMERA) {
        applyOrthographicBounds(camera);
      }

      updateCamSsao(bounds);
    }

    function syncCamShadowCasters(root) {
      const shadowMap = camShadowGenerator.getShadowMap();
      if (shadowMap?.renderList) {
        shadowMap.renderList.length = 0;
      }

      for (const mesh of root.getChildMeshes()) {
        mesh.renderingGroupId = 1;
        mesh.receiveShadows = true;
        camShadowGenerator.addShadowCaster(mesh, false);
      }

      updateCamShadowGround();
    }

    function updateCamShadowGround() {
      if (!shadowsEnabled) {
        stableShadowLight.shadowEnabled = false;
        camShadowGround.setEnabled(false);
        camContactShadow.setEnabled(false);
        return;
      }

      const bounds = getModelBounds(modelRoot.getChildMeshes());
      if (!bounds) {
        camShadowGround.setEnabled(false);
        camContactShadow.setEnabled(false);
        return;
      }

      const width = Math.max(bounds.max.x - bounds.min.x, 1e-3);
      const depth = Math.max(bounds.max.y - bounds.min.y, 1e-3);
      const footprint = Math.max(
        width,
        depth,
        bounds.boundingRadius * 1.6,
        8,
      );
      const planeSize = Math.max(40, footprint * 3);
      const contactWidth = Math.max(3, width * 1.85);
      const contactDepth = Math.max(3, depth * 1.85);
      const shadowPlaneZ = bounds.min.z - 0.006;
      const contactShadowZ = bounds.min.z - 0.004;

      camShadowGround.setEnabled(true);
      camShadowGround.position.set(bounds.center.x, bounds.center.y, shadowPlaneZ);
      camShadowGround.scaling.set(planeSize, planeSize, 1);

      camContactShadow.setEnabled(true);
      camContactShadow.position.set(bounds.center.x, bounds.center.y, contactShadowZ);
      camContactShadow.scaling.set(contactWidth, contactDepth, 1);

      stableShadowLight.shadowEnabled = true;
      stableShadowLight.position.set(bounds.center.x, bounds.center.y, bounds.max.z + Math.max(20, bounds.boundingRadius * 4));
      stableShadowLight.direction.set(0, 0, -1);
    }

    function projectToScreen(point) {
      return Vector3.Project(
        point,
        Matrix.IdentityReadOnly,
        scene.getTransformMatrix(),
        camera.viewport.toGlobal(mainCanvas.clientWidth, mainCanvas.clientHeight),
      );
    }

    function getWorldUnitsPerPixelAt(point) {
      const origin = projectToScreen(point);
      const xUnit = projectToScreen(new Vector3(point.x + 1, point.y, point.z));
      const yUnit = projectToScreen(new Vector3(point.x, point.y + 1, point.z));
      const pixelsPerWorldUnit = Math.max(
        1e-4,
        (
          Math.hypot(xUnit.x - origin.x, xUnit.y - origin.y) +
          Math.hypot(yUnit.x - origin.x, yUnit.y - origin.y)
        ) / 2,
      );

      return 1 / pixelsPerWorldUnit;
    }

    function getNiceFloorValue(value) {
      if (!Number.isFinite(value) || value <= 0) {
        return 1;
      }

      const exponent = Math.floor(Math.log10(value));
      const magnitude = 10 ** exponent;
      const normalized = value / magnitude;
      let selected = 1;

      for (const factor of [1, 2, 2.5, 5, 10]) {
        if (factor <= normalized + 1e-9) {
          selected = factor;
        }
      }

      return selected * magnitude;
    }

    function formatScaleBarValue(value) {
      const absValue = Math.abs(value);
      const decimals = absValue >= 100
        ? 0
        : absValue >= 10
          ? 1
          : absValue >= 1
            ? 2
            : 3;

      return Number(value.toFixed(decimals)).toString();
    }

    function updateScaleBar() {
      const bounds = getModelBounds(modelRoot.getChildMeshes());
      if (!bounds) {
        scaleBar.style.display = 'none';
        scaleBarState.visible = false;
        return;
      }

      const anchor = bounds.center;
      const valuePerPixel = getWorldUnitsPerPixelAt(anchor) * currentGridUnitOptions.coordinateScale;
      const targetPixels = 120;
      const scaleValue = getNiceFloorValue(valuePerPixel * targetPixels);
      const pixelWidth = Math.max(48, Math.min(160, scaleValue / valuePerPixel));

      scaleBarState.visible = true;
      scaleBarState.unitLabel = currentGridUnitOptions.unitLabel;
      scaleBarState.value = scaleValue;
      scaleBarState.pixelWidth = pixelWidth;
      scaleBarState.label = `${formatScaleBarValue(scaleValue)} ${currentGridUnitOptions.unitLabel}`;

      scaleBar.style.display = 'flex';
      scaleBarLabel.textContent = scaleBarState.label;
      scaleBarLine.style.width = `${pixelWidth}px`;
    }

    function updateActiveModel(root, summary, name) {
      if (modelRoot) {
        disposeStoredDefaultMaterials(modelRoot);
        modelRoot.dispose(false, true);
        activeOverrideMaterial = null;
      }

      modelRoot = root;
      modelRoot.name = 'modelRoot';
      captureDefaultMaterials(modelRoot);
      activeModelSummary = {
        name,
        meshCount: summary.meshCount,
        triangleCount: summary.triangleCount,
      };
      applyMaterialModeToRoot(modelRoot);

      fitCameraToModel(modelRoot.getChildMeshes());
      gridMap.fitToMeshes(modelRoot.getChildMeshes());
      syncCamShadowCasters(modelRoot);
    }

    applyMaterialModeToRoot(modelRoot);
    fitCameraToModel(modelRoot.getChildMeshes());
    gridMap.fitToMeshes(modelRoot.getChildMeshes());
    syncCamShadowCasters(modelRoot);

    engine.runRenderLoop(() => {
      updateCamViewportLights();
      gridMap.update();
      updateScaleBar();
      scene.render();
    });
    window.addEventListener('resize', () => {
      engine.resize();
      updateScaleBar();
    });

    // --- ViewCube ---
    let cubeViewDriving = false;

    const cubeView = new CubeView({
      canvas: document.getElementById('cubeViewCanvas'),
      width: 150,
      height: 150,
      aspect: 1,
      hoverColor: '#0088ff',
      cubeSize: 2,
      zoom: 16,
      antialias: true,
      onProjectionModeChange: (mode) => {
        if (mode === 'orthographic') {
          camera.mode = Camera.ORTHOGRAPHIC_CAMERA;
          applyOrthographicBounds(camera);
        } else {
          camera.mode = Camera.PERSPECTIVE_CAMERA;
        }
      },
      onOrientationChange: ({ orientation, phase }) => {
        if (phase === 'start') {
          cubeViewDriving = true;
        }

        camera.alpha = orientation.alpha;
        camera.beta = orientation.beta;

        if (phase === 'end') {
          cubeViewDriving = false;
        }
      }
    });

    // Keep the cube synced to the scene camera whenever the scene is driving.
    camera.onViewMatrixChangedObservable.add(() => {
      if (!cubeViewDriving) {
        cubeView.setOrientation({
          alpha: camera.alpha,
          beta: camera.beta,
        });
      }
      if (camera.mode === Camera.ORTHOGRAPHIC_CAMERA) {
        applyOrthographicBounds(camera);
      }
    });

    cubeView.setOrientation({
      alpha: camera.alpha,
      beta: camera.beta,
    });

    // Expose for e2e tests
    window.cubeView = cubeView;
    window.rendererDemo = {
      getModelSummary: () => ({ ...activeModelSummary }),
      getStatus: () => ioStatusText,
      getMaterialSummary: () => {
        const material = modelRoot.getChildMeshes()[0]?.material;
        return {
          mode: currentMaterialMode,
          label: MATERIAL_MODE_LABELS[currentMaterialMode],
          name: material?.name ?? '',
          className: material?.getClassName?.() ?? '',
          hasAlbedoTexture: Boolean(material?.albedoTexture),
          hasBumpTexture: Boolean(material?.bumpTexture),
          hasMetallicTexture: Boolean(material?.metallicTexture),
          albedoColor: material?.albedoColor?.toHexString?.() ?? material?.diffuseColor?.toHexString?.() ?? '',
          metallic: material?.metallic ?? null,
          roughness: material?.roughness ?? null,
          environmentIntensity: material?.environmentIntensity ?? null,
          clearCoatEnabled: Boolean(material?.clearCoat?.isEnabled),
        };
      },
      setMaterialMode: (mode) => setMaterialMode(mode),
      getMaterialModes: () => [...MATERIAL_MODE_KEYS],
      getUnit: () => ({ ...getLengthUnitDefinition(currentUnit) }),
      setUnit: (unit) => setProjectUnit(unit),
      getScaleBarSummary: () => ({ ...scaleBarState }),
      getModelBounds: () => {
        const bounds = getModelBounds(modelRoot.getChildMeshes());
        if (!bounds) {
          return null;
        }
        return {
          min: { x: bounds.min.x, y: bounds.min.y, z: bounds.min.z },
          max: { x: bounds.max.x, y: bounds.max.y, z: bounds.max.z },
          center: { x: bounds.center.x, y: bounds.center.y, z: bounds.center.z },
          boundingRadius: bounds.boundingRadius,
        };
      },
      getGridSummary: () => ({ ...gridMap.getState() }),
      getGridLabelNames: () => scene.meshes
        .map((mesh) => mesh.name)
        .filter((name) => name.startsWith('grid_right_') || name.startsWith('grid_bottom_')),
      setCameraRadius: (radius) => {
        camera.radius = radius;
        if (camera.mode === Camera.ORTHOGRAPHIC_CAMERA) {
          applyOrthographicBounds(camera);
        }
      },
      getShadowSummary: () => {
        const shadowMap = camShadowGenerator.getShadowMap();
        return {
          enabled: shadowsEnabled && camShadowGround.isEnabled(),
          toggleEnabled: shadowsEnabled,
          lightShadowEnabled: stableShadowLight.shadowEnabled,
          casterCount: shadowMap?.renderList?.length ?? 0,
          casterNames: shadowMap?.renderList?.map((mesh) => mesh.name) ?? [],
          receiverName: camShadowGround.name,
          receiverZ: camShadowGround.position.z,
          receiverEnabled: camShadowGround.isEnabled(),
          receiverLightNames: camShadowGround.lightSources.map((light) => light.name),
          contactShadowEnabled: camContactShadow.isEnabled(),
          contactShadowName: camContactShadow.name,
          contactShadowZ: camContactShadow.position.z,
          lightName: stableShadowLight.name,
          lightPosition: {
            x: stableShadowLight.position.x,
            y: stableShadowLight.position.y,
            z: stableShadowLight.position.z,
          },
          lightDirection: {
            x: stableShadowLight.direction.x,
            y: stableShadowLight.direction.y,
            z: stableShadowLight.direction.z,
          },
          darkness: camShadowGenerator.darkness,
          blurKernel: camShadowGenerator.blurKernel,
          useBlurExponentialShadowMap: camShadowGenerator.useBlurExponentialShadowMap,
        };
      },
      setShadowEnabled: (enabled) => setShadowEnabled(enabled),
      getSsaoSummary: () => ({
        supported: SSAO2RenderingPipeline.IsSupported,
        enabled: ssaoEnabled,
        radius: camSsaoPipeline?.radius ?? 0,
        totalStrength: camSsaoPipeline?.totalStrength ?? 0,
        base: camSsaoPipeline?.base ?? 0,
        maxZ: camSsaoPipeline?.maxZ ?? 0,
        samples: camSsaoPipeline?.samples ?? 0,
        textureSamples: camSsaoPipeline?.textureSamples ?? 0,
        expensiveBlur: camSsaoPipeline?.expensiveBlur ?? false,
        bilateralSamples: camSsaoPipeline?.bilateralSamples ?? 0,
        bilateralSoften: camSsaoPipeline?.bilateralSoften ?? 0,
        bilateralTolerance: camSsaoPipeline?.bilateralTolerance ?? 0,
      }),
      setSsaoEnabled: (enabled) => setSsaoEnabled(enabled),
      offsetModel: ({ x = 0, y = 0, z = 0 }) => {
        modelRoot.position.set(x, y, z);
        fitCameraToModel(modelRoot.getChildMeshes());
        gridMap.fitToMeshes(modelRoot.getChildMeshes());
        updateCamShadowGround();
      },
    };

    stepFileInput.addEventListener('change', async (event) => {
      const [file] = event.target.files ?? [];
      if (!file || ioBusy) {
        return;
      }

      setIoBusy(true);

      try {
        const { root, summary } = await loadStepModel({
          scene,
          file,
          importParams: {
            linearUnit: currentUnit,
            linearDeflectionType: 'bounding_box_ratio',
            linearDeflection: 0.001,
            angularDeflection: 0.5,
          },
          worldScale: 1 / currentGridUnitOptions.coordinateScale,
          onStatus: setIoStatus,
        });

        updateActiveModel(root, summary, file.name);
      } catch (error) {
        console.error(error);
        setIoStatus(error instanceof Error ? error.message : 'Failed to load STEP file.');
      } finally {
        stepFileInput.value = '';
        setIoBusy(false);
      }
    });

    stepExportBtn.addEventListener('click', async () => {
      if (ioBusy) {
        return;
      }

      setIoBusy(true);

      try {
        const fileStem = activeModelSummary.name.replace(/\.[^.]+$/, '');
        await exportMeshesToStep({
          meshes: modelRoot.getChildMeshes(),
          fileName: `${fileStem}.step`,
          linearUnit: currentUnit,
          coordinateScale: currentGridUnitOptions.coordinateScale,
          onStatus: setIoStatus,
        });
      } catch (error) {
        console.error(error);
        setIoStatus(error instanceof Error ? error.message : 'Failed to export STEP file.');
      } finally {
        setIoBusy(false);
      }
    });

    // Language toggle
    const langBtn = document.getElementById('langBtn');
    langBtn.addEventListener('click', () => {
      const current = cubeView.getLocale();
      const next = current === 'en' ? 'zh' : 'en';
      cubeView.setLocale(next);
      langBtn.textContent = next === 'en' ? '中文' : 'EN';
    });
  </script>
</body>
</html>
